<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome · Hermes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Canvas background */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Floating glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .orb:nth-child(2) { width: 500px; height: 500px; background: #ff6a33; top: -10%; left: -5%; animation-delay: 0s; }
    .orb:nth-child(3) { width: 400px; height: 400px; background: #9945ff; bottom: -15%; right: -8%; animation-delay: -7s; }
    .orb:nth-child(4) { width: 300px; height: 300px; background: #00d4ff; bottom: 30%; left: 20%; animation-delay: -14s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 30px) scale(0.9); }
    }

    /* Center content */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 700px;
      padding: 2rem;
    }

    .hero h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      background: linear-gradient(135deg, #ff6a33, #9945ff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      animation: fadeInUp 1s ease-out;
    }

    .hero p {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 2.5rem;
      line-height: 1.7;
      animation: fadeInUp 1s ease-out 0.2s both;
    }

    .glow-btn {
      display: inline-block;
      padding: 1rem 3rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff6a33, #9945ff);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: fadeInUp 1s ease-out 0.4s both;
      text-decoration: none;
    }
    .glow-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 40px rgba(153, 69, 255, 0.4);
    }
    .glow-btn::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px;
      width: calc(100% + 4px); height: calc(100% + 4px);
      background: linear-gradient(45deg, #ff6a33, #9945ff, #00d4ff, #ff6a33);
      background-size: 400%;
      border-radius: 50px;
      z-index: -1;
      animation: borderGlow 3s linear infinite;
    }
    .glow-btn::after {
      content: '';
      position: absolute;
      inset: 2px;
      background: #0a0a0f;
      border-radius: 48px;
      z-index: -1;
    }

    @keyframes borderGlow {
      0% { background-position: 0 0; }
      100% { background-position: 400% 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 3rem;
      justify-content: center;
      margin-top: 3rem;
      animation: fadeInUp 1s ease-out 0.6s both;
    }
    .stat-item {
      text-align: center;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #9945ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.25rem;
    }

    /* Floating tech icons */
    .tech-icon {
      position: fixed;
      font-size: 2rem;
      opacity: 0.08;
      z-index: 0;
      animation: techFloat 15s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes techFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
  </style>
</head>
<body>

  <!-- Glow orbs -->
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>

  <!-- Floating tech symbols -->
  <div class="tech-icon" style="top:15%;left:8%;font-size:3rem;">⚡</div>
  <div class="tech-icon" style="top:70%;left:85%;font-size:2.5rem;">✦</div>
  <div class="tech-icon" style="top:50%;left:5%;font-size:1.8rem;">◈</div>
  <div class="tech-icon" style="top:10%;left:75%;font-size:2.2rem;">◇</div>
  <div class="tech-icon" style="top:80%;left:20%;font-size:2rem;">○</div>

  <!-- Particle canvas -->
  <canvas id="particles-canvas"></canvas>

  <!-- Hero section -->
  <div class="hero">
    <h1>Welcome</h1>
    <p>Powered by Hermes Agent · Built with creativity, code, and a whole lot of heart. Explore the intersection of AI and the web.</p>
    <a href="https://github.com/bobermes365" class="glow-btn" target="_blank">Visit GitHub →</a>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-number" id="stat-repos">0</div>
        <div class="stat-label">Repositories</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="stat-commits">0</div>
        <div class="stat-label">Commits</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="stat-lines">0</div>
        <div class="stat-label">Lines of Code</div>
      </div>
    </div>
  </div>

  <script>
    // ===== PARTICLE SYSTEM =====
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let mouseActive = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 0.8;
        this.speedY = (Math.random() - 0.5) * 0.8;
        this.opacity = Math.random() * 0.5 + 0.2;
        this.hue = Math.random() * 60 + 20; // warm orange-ish range
        this.life = Math.random() * 200 + 100;
        this.maxLife = this.life;
      }
      update() {
        // Mouse interaction
        if (mouseActive) {
          const dx = this.x - mouseX;
          const dy = this.y - mouseY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            const force = (150 - dist) / 150 * 2;
            this.speedX += (dx / dist) * force * 0.05;
            this.speedY += (dy / dist) * force * 0.05;
          }
        }

        this.x += this.speedX;
        this.y += this.speedY;
        this.life--;

        // Friction
        this.speedX *= 0.99;
        this.speedY *= 0.99;

        // Wrap around edges
        if (this.x < -10) this.x = canvas.width + 10;
        if (this.x > canvas.width + 10) this.x = -10;
        if (this.y < -10) this.y = canvas.height + 10;
        if (this.y > canvas.height + 10) this.y = -10;

        if (this.life <= 0) this.reset();
      }
      draw() {
        const lifeRatio = this.life / this.maxLife;
        const alpha = this.opacity * lifeRatio;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha})`;
        ctx.fill();

        // Glow effect
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha * 0.1})`;
        ctx.fill();
      }
    }

    // Create particles
    const particleCount = Math.min(120, Math.floor(canvas.width * canvas.height / 8000));
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    // Connection lines
    function drawConnections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            const alpha = (1 - dist / 120) * 0.15;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    // Mouse tracking
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      mouseActive = true;
    });
    canvas.addEventListener('mouseleave', () => { mouseActive = false; });

    // Touch support
    canvas.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      mouseX = touch.clientX;
      mouseY = touch.clientY;
      mouseActive = true;
    }, { passive: true });
    canvas.addEventListener('touchend', () => { mouseActive = false; }, { passive: true });

    // Animation loop
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      drawConnections();
      requestAnimationFrame(animate);
    }
    animate();

    // ===== ANIMATED COUNTERS =====
    function animateCounter(el, target, duration = 2000) {
      const start = performance.now();
      const startVal = 0;

      function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        // Ease out cubic
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(startVal + (target - startVal) * eased);
        el.textContent = current.toLocaleString();
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    // Start counters when element is visible
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          animateCounter(document.getElementById('stat-repos'), 42);
          animateCounter(document.getElementById('stat-commits'), 1337);
          animateCounter(document.getElementById('stat-lines'), 24000);
          observer.disconnect();
        }
      });
    });
    observer.observe(document.querySelector('.stats'));

    // Window resize handler for particle count
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        resizeCanvas();
        const newCount = Math.min(120, Math.floor(canvas.width * canvas.height / 8000));
        while (particles.length < newCount) particles.push(new Particle());
        while (particles.length > newCount) particles.pop();
      }, 200);
    });
  </script>
</body>
</html>
